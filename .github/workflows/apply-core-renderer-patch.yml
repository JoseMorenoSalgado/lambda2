name: Apply core renderer patch

on:
  push:
    paths:
      - .github/workflows/apply-core-renderer-patch.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply Moodle 5.2 core renderer patch
        run: |
          set -e
          if git apply --check patches/moodle52-core-renderer.patch; then
            git apply patches/moodle52-core-renderer.patch
          else
            echo "Patch cannot be applied or was already applied."
            exit 0
          fi

      - name: Remove one-time workflow
        run: |
          rm -f .github/workflows/apply-core-renderer-patch.yml

      - name: Commit applied patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add classes/output/core_renderer.php .github/workflows/apply-core-renderer-patch.yml
          git commit -m "Apply Moodle 5.2 core renderer compatibility patch" || exit 0
          git push
