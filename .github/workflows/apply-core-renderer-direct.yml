name: Apply core renderer direct fixes

on:
  push:
    paths:
      - .github/workflows/apply-core-renderer-direct.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Apply direct Moodle 5.2 fixes
        run: |
          set -e
          FILE="classes/output/core_renderer.php"

          perl -0pi -e 's/login-identityprovider-btn btn-block/login-identityprovider-btn w-100/g' "$FILE"
          perl -0pi -e 's/navbar-form pull-right/navbar-form float-end/g' "$FILE"
          perl -0pi -e 's/<button type="button" class="close" data-bs-dismiss="modal" aria-label="Close"><span aria-hidden="true">×<\/span><\/button>/<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"><\/button>/g' "$FILE"
          perl -0pi -e 's/login-form-username form-group/login-form-username mb-3/g' "$FILE"
          perl -0pi -e 's/login-form-password form-group/login-form-password mb-3/g' "$FILE"
          perl -0pi -e 's/login-form-submit form-group/login-form-submit mb-3/g' "$FILE"
          perl -0pi -e 's/login-form-forgotpassword form-group/login-form-forgotpassword mb-3/g' "$FILE"
          perl -0pi -e 's/class="sr-only"/class="visually-hidden"/g' "$FILE"
          perl -0pi -e 's/\$showfacebook \|\| \$showtwitter \|\| \$showwhatsapp \|\| \$showlinkedin \|\| \$showpinterest/\$showfacebook || \$showtwitterx || \$showwhatsapp || \$showlinkedin || \$showpinterest/g' "$FILE"
          perl -0pi -e 's/input-group-append/input-group-text p-0 border-0 bg-transparent/g' "$FILE"

          grep -q '\$showfacebook || \$showtwitterx || \$showwhatsapp || \$showlinkedin || \$showpinterest' "$FILE"
          ! grep -q '\$showfacebook || \$showtwitter || \$showwhatsapp || \$showlinkedin || \$showpinterest' "$FILE"

      - name: Remove one-time workflow
        run: |
          rm -f .github/workflows/apply-core-renderer-direct.yml

      - name: Commit direct fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add classes/output/core_renderer.php .github/workflows/apply-core-renderer-direct.yml
          git commit -m "Apply Moodle 5.2 direct fixes to core renderer" || exit 0
          git push
